<!DOCTYPE html>
<html>
<head>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
</head>
<body>
	<script>
		let xpos
		let ypos
		function setup(){
		createCanvas(800,800)
		background(231, 214, 237)
		noStroke()
		xpos=width/2
		ypos=height/2
		// let randomNumber = random(0, width)
		// console.log(randomNumber)

	}
	
		function draw(){
			let randomNumber = floor(random(4))
				if (randomNumber == 0){
					xpos = xpos + 1
				}
				else if (randomNumber == 1){
					xpos = xpos - 1
				}
				else if (randomNumber == 2){
					ypos = ypos + 1
				}
				else if (randomNumber == 3){
					ypos = ypos - 1
				}
				fill(255,233,243)
		circle(xpos, ypos, 10)
	}
	</script>
</body>
</html>
