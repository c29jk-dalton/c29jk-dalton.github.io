<!DOCTYPE html>
<html>
<head>
	<style type="text/css">
		
		#dino{
			background-image: url(dino.png);
			height: 200px;
			width: 200px;
			background-size: contain;
			background-repeat: no-repeat;
			position: absolute;
			left: 100px;
			top: 100px;
			transition: 0.5s;
		}
		#turtle{
			background-image: url(turtle.png);
			height: 200px;
			width: 200px;
			background-size: contain;
			background-repeat: no-repeat;
			position: absolute;
			left: 100px;
			top: 100px;
			transition: 0.5s;
		}


	</style>
</head>
<body>


	<div id="dinosaur"></div>
	<div id="turtle"></div>

	<script type="text/javascript">
		

		function move (){
			dinosaur.style.top = Math.random()*1000+"px"
			dinosaur.style.left = Math.random()*1000+"px"
		}
		setInterval(move,500)

	</script>



</body>
</html>
