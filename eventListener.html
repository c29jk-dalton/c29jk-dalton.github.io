<!DOCTYPE html>
<html>
<head>
	<style type="text/css">
		

		#bunny{
			width: 300px;
			height: 300px;
			background-image: url(https://i.pinimg.com/originals/2c/a1/a8/2ca1a8f446db1e792e84b0214fd7b4f1.gif);
			background-size: contain;
			position: absolute;
		}
		#bunny2{
			background-image: url(https://orig15.deviantart.net/bf50/f/2012/029/5/4/k__bunny_run_run__3_by_snow_body-d4nzc3i.gif);
			width: 300px;
			height: 300px;
			background-size: contain;
			position: absolute;
			background-repeat: no-repeat;
		}
	</style>
</head>
<body>

	<div id="bunny"></div>
	<div id="bunny2"></div>

<script type="text/javascript">
	bunny.style.left="0px"
	document.addEventListener("keypress",function(){
		console.log(bunny.style.left)
		bunny.style.left = parseInt(bunny.style.left) + 20+"px"
	})

	bunny2.style.right="0px"
	document.addEventListener("keypress",function(){
		console.log(bunny2.style.right)
		bunny2.style.right = parseInt(bunny2.style.right) + 20+"px"
	})

</script>
</body>
</html>
