<!DOCTYPE html>
<html>
<head>
	<style type="text/css">
		
		#dinosaur{
			background-image: url(dino.png);
			height: 500px;
			width: 500px;
			background-size: contain;
			background-repeat: no-repeat;
			position: absolute;
			left: 100px;
			top: 100px;
			transition: 0.5s;
		}
		#turtle{
			border: 1px solid red;
			background-image: url(turtle.png);
			height: 200px;
			width: 200px;
			background-size: contain;
			background-repeat: no-repeat;
			position: absolute;
			left: 100px;
			top: 100px;
			transition: 0.5s;
			transform: translate(-100px, -100px);
		}


	</style>
</head>
<body>


	<div id="dinosaur"></div>
	<div id="turtle"></div>

	<script type="text/javascript">
		

		function move (){
			dinosaur.style.top = Math.random()*1000+"px"
			dinosaur.style.left = Math.random()*1000+"px"
		}
		setInterval(move,50)
		window.addEventListener("mousemove", function(event){
			console.log(event)
			turtle.style.top = event.pageY + "px"
			turtle.style.left = event.pageX + "px"
		})
	</script>



</body>
</html>
