<!DOCTYPE html>
<html>
<head>
	<style type="text/css">
		body{
			background-color: black;
		}
		
		.littles{
			width: 12px;
			height: 7px;
			border: 1px solid black;
			display: inline-block;
			position: absolute;
			transform: rotate(45deg);
			animation-name: spin;
			animation-iteration-count: infinite;
			animation-duration: 20s;
		}

		@keyframes spin {
			from {
				transform: rotate(-360deg);
			}
			to {
				transform: rotate(360deg);
			}
		}



	</style>
</head>
<body>



	<script type="text/javascript">
		
		function makeConfetti (){
			let confetti = document.createElement("div")
			confetti.classList.add("littles")
			document.body.appendChild(confetti)
			let r = Math.round(Math.random()*255)
			let g = Math.round(Math.random()*255)
			let b = Math.round(Math.random()*255)

			confetti.style.backgroundColor = "rgb("+r+","+g+","+b+")"
			confetti.style.top = Math.random()*2000+"px"
			confetti.style.left = Math.random()*2000+"px"
			confetti.style.transform = "rotate("+Math.random()*360+"deg)"

			let startRot = Math.random()* -360 + "deg"
			let endRot = Math.random()* 360 + "deg"

			function fall(){
				let fallFactor = 10
				confetti.style.top = parseInt(confetti.style.top) + fallFactor + "px"
				if (parseInt(confetti.style.top)>1000) {
					confetti.style.top = Math.random()*200+"px"
				}
			}

			// confetti.style.setProperty("--startRot", startRot)
			// confetti.style.setProperty("--endRot", endRot)
			setInterval(fall,50)
		}

		// setInterval(makeConfetti,20)

		for(let i = 0; i < 1000; i++){
			makeConfetti()
		}





	</script>




</body>
</html>
