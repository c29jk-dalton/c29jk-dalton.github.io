<!DOCTYPE html>
<html>
<head>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
</head>
<body>
	<script>
		let xpos
		let ypos
		let xspeed
		let yspeed
		function setup(){
		createCanvas(800,800)
		

		xpos=width/2
		xspeed = 5
		ypos=height/2
		yspeed = 8
		d=50
		// let randomNumber = random(0, width)
		// console.log(randomNumber)

	}
	
		function draw(){
			background(231, 214, 237)
				if (xpos + d/2 > width || xpos - d/2 < 0){
					xspeed = xspeed * -1
				}
				if (ypos + d/2 > height || ypos - d/2 < 0){
					yspeed *= -1
				}
				xpos+=xspeed
				ypos+= yspeed
				fill(255,233,243)
		circle(xpos, ypos, d)
	}
	</script>
</body>
</html>
