<!DOCTYPE html>
<html>
<head>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
</head>
<body>
	<script>
		let xpos
		let ypos
		let xspeed
		let yspeed
		let fillColor = "blue"
		function setup(){
		createCanvas(800,800)
		

		xpos=width/2
		xspeed = 5
		ypos=height/2
		yspeed = 8
		d=50
		// let randomNumber = random(0, width)
		// console.log(randomNumber)

	}
	
		function draw(){
			background(247, 244, 234)
				if (xpos + d/2 > width || xpos - d/2 < 0){
					xspeed = xspeed * -1
				}
				if (ypos + d/2 > height || ypos - d/2 < 0){
					yspeed *= -1
				}
				changeBallColor()
				xpos+=xspeed
				ypos+= yspeed
				fill(fillColor)
		circle(xpos, ypos, d)
		
	}
	function changeBallColor(){
			if(xpos>width/2 && ypos<height/2){
				fillColor = "rgb(222, 217, 226)"
			}
			else if(xpos>width/2 && ypos>height/2){
				fillColor = "rgb(192, 185, 221)"
			}
			else if(xpos<width/2 && ypos<height/2){
				fillColor = "rgb(128, 161, 212)"
			}
			else if(xpos,width/2 && ypos>height/2){
				fillColor = "rgb(117, 201, 200)"
			}
		}
	</script>
</body>
</html>
